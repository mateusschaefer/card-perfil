<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Card de Perfil</title>

  <style>
    body {
      background-color: #f0f0f0;
      text-align: center;
      padding-top: 100px;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 280px;
      background-color: white;
      border-radius: 12px;
      box-shadow: 2px 4px 10px gray;
      padding: 30px;
      margin: 0 auto;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 4px 8px 20px gray;
    }

    .card img {
      width: 180px;
      height: px;
      border-radius: 50%;
    }

    .card h2 {
      font-size: 20px;
      color: #333;
    }

    .card p {
      font-size: 14px;
      color: #777;
    }

    .card button {
      padding: 10px 24px;
      background-color: #6c63ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .card button:hover {
      background-color: #574fd6;
    }
  </style>
</head>

<body>

  <div class="card">
    <img src="https://i.postimg.cc/brd0g3q9/esse.jpg" alt="Foto de perfil">
    <h2>Mateus Münch Schaefer</h2>
    <p>Especialista em Auto Peças</p>
    <button>Ver perfil</button>
  </div>

</body>
</html>
